<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <!-- helps with scaling on different devices and screen sizes, improving responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket.io simple chat</title>

    <!-- Bootstrap and custom style sheet is imported, with bootstrap being overriden-->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/demo.css" />


</head>
<body>

    
    <!--chat heading-->
    <h1>Chat</h1>
    
    
    <!--navigation bar-->
    <nav id="nav">
            <a href="index.html">Home</a>
            <a href="aboutme.html">About me </a>
            Chat
    </nav>


    

    <!--sidenavigation for current users using application-->
    <div class="sidenav">
        <div class="inbox__people">
            <h4>Active users</h4>
        </div>

    </div>


    <br>
    <hr>
    <!--container for chat messages-->
    <div class="content container container-fluid">

        <!--Displays messages-->
        <div class="messages__history"></div>
        <div class="fallback"></div>
        <div class="inbox__messages">


        </div>

        <!--message form for sending messages-->
        <form class="message_form">
            <input type="text" class="message_form__input" placeholder="Type a message" />
            <button class="message_form__button" type="submit">
                Enter
            </button>
        </form>
    </div>

    <!--links scripts to enable chat application-->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/client.js"></script>
</body>
</html>
